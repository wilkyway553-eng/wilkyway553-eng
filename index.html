<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои рецепты</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6e3;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #d35400;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .search-box {
            margin-bottom: 30px;
            text-align: center;
        }
        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #f39c12;
            border-radius: 30px;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #d35400;
            box-shadow: 0 0 8px rgba(211, 84, 0, 0.3);
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        .recipe-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            max-width: 350px;
            justify-self: center;
        }
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        .recipe-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .recipe-card .card-content {
            padding: 15px;
            flex-grow: 1;
        }
        .recipe-card h2 {
            margin-bottom: 8px;
            color: #d35400;
            font-size: 1.5rem;
        }
        .recipe-card p {
            color: #555;
            font-size: 0.95rem;
        }

        .no-results {
            text-align: center;
            font-size: 1.2rem;
            color: #999;
            margin-top: 40px;
            display: none;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ Мои кулинарные рецепты</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск рецепта...">
    </div>

    <div class="recipes-grid" id="recipesGrid">
        <!-- Карточка 1: Пицца в стиле Нью-Йорк -->
        <a href="pizza-ny.html" class="recipe-card" data-title="Пицца в стиле Нью-Йорк">
            <img src="https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=400" alt="Пицца Нью-Йорк">
            <div class="card-content">
                <h2>Пицца Нью-Йорк</h2>
                <p>Тонкое хрустящее тесто, богатая начинка.</p>
            </div>
        </a>

        <!-- Карточка 2: Гёдза -->
        <a href="gedza.html" class="recipe-card" data-title="Гёдза Гедза">
            <img src=https://images.unsplash.com/photo-1563245372-f21724e3856d?w=800 alt="Гёдза">
            <div class="card-content">
                <h2>Гёдза</h2>
                <p>Японские пельмешки с хрустящей корочкой.</p>
            </div>
        </a>

        <!-- Здесь можешь добавлять новые карточки -->
    </div>

    <div class="no-results" id="noResults">😕 Рецептов не найдено</div>

    <footer>
        © 2025, Мой кулинарный сайт. Приятного аппетита!
    </footer>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const recipeCards = document.querySelectorAll('.recipe-card');
    const noResults = document.getElementById('noResults');

    searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase().trim();
        let hasVisible = false;

        recipeCards.forEach(card => {
            const title = card.getAttribute('data-title').toLowerCase();
            if (title.includes(searchTerm)) {
                card.style.display = '';
                hasVisible = true;
            } else {
                card.style.display = 'none';
            }
        });

        if (!hasVisible && searchTerm !== '') {
            noResults.style.display = 'block';
        } else {
            noResults.style.display = 'none';
        }
    });
</script>

</body>
</html>
